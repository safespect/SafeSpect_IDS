<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0b0f1a] text-white flex items-center justify-center min-h-screen">
    <div class="bg-[#0f172a] p-8 rounded-2xl border border-gray-800 w-full max-w-md shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-white italic mb-2">SAFE<span class="text-blue-500">SPECT</span></h1>
            <p class="text-gray-400">Sign in to your XAI Dashboard</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="mb-4 p-3 rounded bg-red-500/10 border border-red-500/50 text-red-400 text-sm">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm text-gray-400 mb-1">Email Address</label>
                <input type="email" name="email" required class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 focus:outline-none focus:border-blue-500 transition">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Password</label>
                <input type="password" name="password" required class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 focus:outline-none focus:border-blue-500 transition">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-lg font-bold transition duration-300">Login</button>
        </form>

        <p class="mt-6 text-center text-gray-500 text-sm">
            Don't have an account? <a href="/signup" class="text-blue-400 hover:underline">Sign up</a>
        </p>
    </div>
</body>
</html>
