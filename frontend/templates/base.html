<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeSpect | XAI IDS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-[#0b0f1a] text-slate-200">

    <nav class="border-b border-gray-800 bg-[#0f172a] px-6 py-3 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <span class="text-2xl font-black tracking-tighter text-white italic">SAFE<span class="text-blue-500">SPECT</span></span>
        </div>

        <div class="flex items-center gap-4">
            <div class="text-right">
                <p class="text-xs text-gray-400 font-mono">{{ user_email }}</p>
            </div>
            <a href="/logout" class="text-gray-400 hover:text-red-400 transition-colors">
                <i data-lucide="log-out" class="w-5 h-5"></i>
            </a>
        </div>
    </nav>

    <div class="container mx-auto p-6">
        {% block content %}{% endblock %}
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
